<!DOCTYPE html>
<html>
<meta charset="utf-8">
 
<head>
    <title>Geometric uniform</title>
    <link type="text/css" rel="stylesheet" media="screen" href="./css/page.css">
    <link type="text/css" rel="stylesheet" media="screen" href="./css/chart.css">

    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-AMS_HTML&delayStartupUntil=configured" type="text/javascript"></script>
    <script src="./mathjax_config.js"></script>

</head>
 
<body>

<div class="container">
    
<h1>Geometric distribution</h1>

<p class="description">
    Toss a coin until we see a heads, what is the chance we stop at the $k$-th toss?
</p>

<h2>$$\small{
    p(k) = 
    \begin{cases}
        (1-p)^{k-1}p, & \text{if } k = 1, 2, \cdots, \\\
        0,              & \text{otherwise.}
    \end{cases} 
}
    $$
</h2>

<div id="chart"></div>

<div class="slider-label">
    <p>$p=$ <span id="p-value"></span></p>
</div>

<div class="slider-container">
    <input type="range" id="p-slider" class="slider" min="0.01" max="0.6" step="0.01"><br>
</div>

<script src="geometric.js"></script>

</div>

</body>
</html>
