<!DOCTYPE html>
<html>
<meta charset="utf-8">
 
<head>
    <title>Geometric distribution</title>
    <link type="text/css" rel="stylesheet" media="screen" href="./css/page.css">
    <link type="text/css" rel="stylesheet" media="screen" href="./css/chart.css">
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-AMS_HTML&delayStartupUntil=configured" type="text/javascript"></script>
    <script src="./js/mathjax_config.js"></script>

</head>
 
<body>

<div class="container">
    
<h1>Geometric distribution</h1>

<p class="description">
    Toss a coin until we see the first heads, how likely we stop at the $k$-th toss?
</p>

<div id="chart"></div>

<div class="controls">
    <div class="slider-label">
        <p>$p=$ <span id="slider_value_0"></span></p>
    </div>

    <div class="slider-container">
        <input type="range" id="slider_0" class="slider" min="0.01" max="0.6" step="0.01"><br>
    </div>
</div>

<div class="formula">
$$
    p(k) = 
    \begin{cases}
        (1-p)^{k-1}p, & \text{if $k = 1, 2, \cdots$,} \\\
        0,            & \text{otherwise.}
    \end{cases} 
    \\[16pt]
    \text{where $p$ is the probability the coin lands on heads.}
$$
</div>

<script src="./js/rand.js"></script>
<script src="./js/chart_functions.js"></script>
<script src="./js/dist/geometric.js"></script>

</div>

</body>
</html>
