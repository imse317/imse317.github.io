<!DOCTYPE html>
<html>
<meta charset="utf-8">
 
<head>
    <title>Exponential distribution</title>
    <link type="text/css" rel="stylesheet" media="screen" href="./css/page.css">
    <link type="text/css" rel="stylesheet" media="screen" href="./css/chart.css">

    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-AMS_HTML&delayStartupUntil=configured" type="text/javascript"></script>
    <script src="./mathjax_config.js"></script>

</head>
 
<body>

<div class="container">

<h1>Exponential distribution</h1>

<h2>$$\small{
    f(x) = 
    \begin{cases}
        \lambda e^{-\lambda x}, & \text{if } x \geq 0, \\
        0,              & \text{otherwise.}
    \end{cases}
}
    $$
</h2>

<div id="chart"></div>

<br>
<div class="slider-label">
    <p>$\lambda=$ <span id="lambda-value"></span></p>
</div>

<div class="slider-container">
    <input type="range" id="lambda-slider" class="slider" min="0.1" max="6" step="0.1"><br>
</div>

<script src="exponential.js"></script>

</div>

</body>
</html>
