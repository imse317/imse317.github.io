<!DOCTYPE html>
<html>
<meta charset="utf-8">
 
<head>
    <title>Binomial distribution</title>
    <link type="text/css" rel="stylesheet" media="screen" href="./css/page.css">
    <link type="text/css" rel="stylesheet" media="screen" href="./css/chart.css">

    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-AMS_HTML&delayStartupUntil=configured" type="text/javascript"></script>
    <script src="./mathjax_config.js"></script>

</head>
 
<body>

<div class="container">

<h1>Binomial distribution</h1>

<p class="description">
    Tossing a coin for $n$ times, what is the chance to get $k$ heads?
</p>

<h2>$$\small{
    p(k) = 
    \begin{cases}
        {n \choose k}p^k(1-p)^{n-k}, & \text{if } k = 0, 1, \cdots, n, \\
        0,              & \text{otherwise.}
    \end{cases} 
}
    $$
</h2>

<div id="chart"></div>

<div class="slider-label">
    <p>$n=$ <span id="n-value"></span></p>
</div>

<div class="slider-container">
    <input type="range" id="n-slider" class="slider" min="10" max="100" step="1"><br>
</div>

<div class="slider-label">
    <p>$p=$ <span id="p-value"></span></p>
</div>

<div class="slider-container">
    <input type="range" id="p-slider" class="slider" min="0.01" max="0.99" step="0.01"><br>
</div>


<script src="binomial.js"></script>

</div>

</body>
</html>
