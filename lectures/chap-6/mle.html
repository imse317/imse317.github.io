# Point estimation

Given a distribution parameter of interest, 

a point estimation is to 
.red[use data to compute a single number that represents an educated guess for the true value of the parameter]. 

<!-- The estimation (e.g., $\hat{\theta}=0.7$) is a single number, hence the name "point" estimation.  -->

In the next lecture we'll discuss "interval" estimation (confidence intervals).

# [Maximum Likelihood Estimation (MLE)](https://en.wikipedia.org/wiki/Maximum_likelihood_estimation)

Select the distribution parameter that makes the observed data .red[most likely.] 

That is, .red[select the parameter that maximizes the probability (likelihood) of obtaining the data at hand].

---

A vector of $n$ observations 
$$X=(X_1, X_2, \cdots, X_n)$$

$X$ can be described by 
- a joint PMF $p_X(x; \theta)$ (if $X$ is discrete)

- a joint PDF $f_X(x; \theta)$ (if $X$ is continuous)

whose form depends on an unknown parameter $\theta$. 

---

Suppose we made $n$ particular observations 
$$x=(x_1, x_2, \cdots, x_n)$$

The likelihood function

$$
\begin{aligned}
\text{Discrete case:}&\;\;\;\;p_X(x_1, x_2, \cdots, x_n; \theta) \\\
\\\
\text{Continuous case:}&\;\;\;\;f_X(x_1, x_2, \cdots, x_n; \theta) \\\
\end{aligned}
$$

--

Important note:

$p_X(x_1, x_2, \cdots, x_n; \theta)$ is .red[not] the probability that the unknown parameter is equal to $\theta$.

It is the probability that the observations $x_1, x_2, \cdots, x_n$ would arise when the unknown parameter is equal to $\theta$.

---
# Maximum Likelihood Estimate (MLE)

A .red[maximum likelihood estimate] is a value of the parameter $\theta$ that maximizes the likelihood function:

$$
\begin{aligned}
\text{Discrete case:}&\;\;\;\;\hat{\theta}=\arg \max_{\theta} p_X(x_1, x_2, \cdots, x_n; \theta) \\\
\\\
\text{Continuous case:}&\;\;\;\;\hat{\theta}=\arg \max_{\theta} f_X(x_1, x_2, \cdots, x_n; \theta) \\\
\end{aligned}
$$

--

In maximizing the likelihood, we are essentially asking:

.red[What is the value of $\theta$ under which the data we received are most likely to arise?]

# How to find the maximum analytically? 

$$\hat{\theta}=\arg \max_{\theta} \big (\theta^7 (1-\theta)^3 \big )$$

--

It is often more convenient to maximize its logarithm, called the .red[log-likelihood function.]

--

$$
\begin{aligned}
\ln\big(\theta^7(1-\theta)^3\big)&=\ln(\theta^7)+\ln(1-\theta)^3 \\\
\\\
&= 7\ln\theta +3\ln(1-\theta) \\\
\end{aligned}
$$ 

Get the derivative of this function w.r.t. $\theta$. Set it to zero.

--

$$7\frac{1}{\hat{\theta}}+3\frac{-1}{1-\hat{\theta}}=0 \;\;\;\;\;\; \rightarrow \;\;\;\;\hat{\theta}=\frac{7}{10}$$

---

Lastly, check 2nd derivative is negative at this point.

.center[![:scale 100%](../images/maxmin.png)]

--

$$
\begin{aligned}
\text{First derivative:}&\;\;\;\;\frac{7}{\theta}-\frac{3}{1-\theta} \\\
\\\
\text{Second derivative:}&\;\;\;\;-\frac{7}{\theta^2}-\frac{3}{(1-\theta)^2} < 0
\end{aligned}
$$ 


<div style="margin-top: 80px; text-align: left;"><a class="sourcelink" href="http://hyperphysics.phy-astr.gsu.edu/hbase/Math/maxmin.html">Image source</a></div>

Alternative: We can also consider the 7 heads out of 10 tosses as a single data point of $y=7$, where

$$Y \sim \text{bin}(10, \theta)$$

--

The likelihood function

$$p_Y(y; \theta)=\text{P}(Y=y; \theta)={10 \choose 7}\theta^7(1-\theta)^3$$

It is the same maximization problem as before.

# Summary: standard procedure of MLE

Step 1. Obtain the .red[likelihood function.]

$$
\begin{aligned}
\text{Discrete case:}&\;\;\;\;p_X(x_1, x_2, \cdots, x_n; \theta) \\\
\\\
\text{Continuous case:}&\;\;\;\;f_X(x_1, x_2, \cdots, x_n; \theta) \\\
\end{aligned}
$$

--

In many cases, the observations are assumed to be independent. 


$$
\begin{aligned}
p_X(x_1, x_2, \cdots, x_n; \theta) &= p_X(x_1; \theta)\cdot p_X(x_2; \theta) \cdots p_X(x_n; \theta) \\\
\\\
&= \prod_{i=1}^n p_X(x_i; \theta) \\\
\end{aligned}
$$

---
# Summary: standard procedure of MLE

Step 2 (optional). It is often more convenient to convert the likelihood function to the .red[log-likelihood function]. 

$$
\begin{aligned}
\ln \big(p_X(x_1, x_2, \cdots, x_n; \theta)\big) &= \ln \bigg(\prod_{i=1}^n p_X(x_i; \theta) \bigg) \\\
\\\
&= \sum_{i=1}^n \ln \big(p_X(x_i; \theta)\big) \\\
\end{aligned}
$$

---
# Summary: standard procedure of MLE

Step 3. Maximization

- Get the derivative of log-likelihood function w.r.t. $\theta$.

- Set the derivative to zero, and solve for $\theta$.

- Check the 2nd derivative at this point is negative. 

---

$$\small{X_i \sim \text{Bernoulli}(\theta)}$$

If we got $k$ heads out of $n$ independent coin tosses,

$$\small{x_1+x_2+\cdots+x_n=k}$$

--

$$
\small{
\begin{aligned}
\ln \big(p_X(x_1, x_2, \cdots, x_n; \theta)\big)&=\ln \bigg(\prod_{i=1}^n p_X(x_i; \theta) \bigg) \\\
\\\
&=\ln \big(\theta^k(1-\theta)^{n-k} \big)  \\\
\\\
&=k \ln\theta + (n-k)\ln(1-\theta) \\\
\end{aligned}
}
$$

--

Set its derivative to zero, solve for $\theta$.

$$\small{\frac{k}{\theta}-\frac{n-k}{1-\theta}=0\;\;\; \rightarrow \;\;\hat{\theta}=\frac{k}{n}=\frac{x_1+x_2+\cdots+x_n}{n}}$$

---

$$\small{X_i \sim \text{Bernoulli}(\theta)}$$

<br>

$$\small{\hat{\theta}=\frac{k}{n}=\frac{x_1+x_2+\cdots+x_n}{n}}$$

<br>

If we use RVs $X_1, X_2, \cdots, X_n$ for the outcomes of $n$ independent tosses, 
the .red[maximum likelihood estimator]

$$\hat{\Theta}_n=\frac{X_1+X_2+\cdots+X_n}{n}$$
