---
Event $A$ is independent of event $B$ if

$$\text{P}(A \mid B)=\text{P}(A)$$

--

By the definition of conditional probability, 

$$\text{P}(A \mid B) = \frac{\text{P}(A \cap B)}{\text{P}(B)}$$

--

From the two equation above, we have

$$\text{P}(A) = \frac{\text{P}(A \cap B)}{\text{P}(B)} $$

--

$$\text{P}(A \cap B) = \text{P}(A) \cdot \text{P}(B)$$
<!-- $$\require{color}\colorbox{yellow}{$\text{P}(A \cap B) = \text{P}(A) \cdot \text{P}(B)$}$$ -->

# Properties of independence


If $A$ and $B$ are independent, so are $A$ and $B^c$. 

--

Intuitively, if .red[knowing that $B$ has occurred] does not provide any new information on how likely $A$ occurs, 

$$\text{P}(A \mid B)=\text{P}(A)$$

then .red[knowing that the complement of $B$ has occurred] should also provide no info on how likely $A$ occurs. 

$$\text{P}(A \mid B^c)=\text{P}(A)$$

<br>
.center[.lightgray[See comment for proof.]]

???
Proof:

$$
\begin{aligned}
\text{P}(A \cap B^c) =& \text{P}(A) - P(A \cap B) \\\
\\\
=& \text{P}(A) - \text{P}(A) \cdot \text{P}(B) \\\
\\\
=& \text{P}(A) \cdot (1- \text{P}(B)) \\\
\\\
=&\text{P}(A) \cdot \text{P}(B)
\end{aligned}
$$

# Independence of three events

Three events $A$, $B$, and $C$

- $A$ and $B$ are independent. 
- &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;$B$ and $C$ are independent.  

<br>

Are $A$ and $C$ independent?

<br><br><br>
.center[.lightgray[See comment for answer.]]


???
No. Counterexample:

Let $A$ and $B$ be two independent events, and $C = A^c$, 

Then $B$ and $C$ (which is $A^c$) are independent. 

However, $A$ and $C$ (which is $A^c$) are disjoint and thus not independent.

We say events $A$, $B$, and $C$ are .red[pairwise independent] if 

- $A$ and $B$ are independent $$\text{P}(A \cap B)=\text{P}(A)\cdot\text{P}(B)$$
- $B$ and $C$ are independent $$\text{P}(B \cap C)=\text{P}(B)\cdot\text{P}(C)$$
- $C$ and $A$ are independent $$\text{P}(C \cap A)=\text{P}(C)\cdot\text{P}(A)$$

--

How about

$$\text{P}(A \cap B \cap C) \stackrel{?}{=} \text{P}(A)\cdot\text{P}(B)\cdot\text{P}(C)$$
<!-- $$\require{color}\colorbox{yellow}{$\text{P}(A \cap B \cap C) \stackrel{?}{=} \text{P}(A)\cdot\text{P}(B)\cdot\text{P}(C)$}$$ -->

# Independence of three events


<br>
Event $A$, $B$, and $C$ are (mutually) independent if

$$
\begin{aligned}
\text{P}(A \cap B) &= \text{P}(A)\cdot\text{P}(B) \\\
\\\
\text{P}(B \cap C) &= \text{P}(B)\cdot\text{P}(C) \\\
\\\
\text{P}(C \cap A) &= \text{P}(C)\cdot\text{P}(A) \\\
\\\
\text{P}(A \cap B \cap C) &= \text{P}(A)\cdot\text{P}(B)\cdot\text{P}(C) \\\
\end{aligned}
$$

---
# Independence of four events

$$
\begin{aligned}
\text{P}(A \cap B) &= \text{P}(A)\cdot\text{P}(B) \\\
\text{P}(B \cap C) &= \text{P}(B)\cdot\text{P}(C) \\\
\text{P}(C \cap D) &= \text{P}(C)\cdot\text{P}(D) \\\
\text{P}(D \cap A) &= \text{P}(D)\cdot\text{P}(A) \\\
\\\
\text{P}(A \cap B \cap C) &= \text{P}(A)\cdot\text{P}(B)\cdot\text{P}(C) \\\
\text{P}(A \cap B \cap D) &= \text{P}(A)\cdot\text{P}(B)\cdot\text{P}(D) \\\
\text{P}(A \cap C \cap D) &= \text{P}(A)\cdot\text{P}(C)\cdot\text{P}(D) \\\
\text{P}(B \cap C \cap D) &= \text{P}(B)\cdot\text{P}(C)\cdot\text{P}(D) \\\
\\\
\text{P}(A \cap B \cap C \cap D) &= \text{P}(A)\cdot\text{P}(B)\cdot\text{P}(C)\cdot\text{P}(D) \\\
\end{aligned}
$$


---
# Independence of $n$ events

<br>
Events $A_1, A_2, \cdots, A_n$ are (mutually) independent if

$$\text{P}\bigg(\bigcap_{i \in S} A_i\bigg)=\prod_{i \in S} \text{P}(A_i)$$

for every subset $S$ of $\\{1, 2, \cdots, n\\}$.
