# Probability

A number that encodes our knowledge or belief about the collective "likelihood" of the elements of $A$.

$\text{P}(A)$: the probability of event $A$. 

--

Roll a fair die. Which of the two would you bet on?
- It's an even number
- It's an odd number

--

Roll two dice. Which of the two would you bet on?

- Total of 7
- Total of 12 


---
# Probability [axioms](https://en.wikipedia.org/wiki/Axiom)

I. Non-negativity

$$\text{P}(A)\geq0,\; \text{for any event $A$}$$

--

II. Normalization

$$ \text{P}(\Omega)=1$$


--

III. Additivity

$$ \text{If } A \cap B = \Phi, \text{ then}$$

$$ \text{P}(A \cup B) = \text{P}(A) + \text{P}(B) $$

---
# A more general form of the additivity

If $ A_1, A_2, A_3, \cdots $ is an infinite collection of disjoint events, then

$$ \text{P}(A_1 \cup A_2 \cup A_3 \cup \cdots) = \text{P}(A_1) + \text{P}(A_2) + \text{P}(A_3) + \cdots$$

---
# Discussion

Recall the non-negativity axiom:

$$\text{P}(A)\geq0,\; \text{for any event $A$}$$

<br>

Do we need to also add the following as an axiom?

$$\text{P}(A) \leq 1, \;\text{for any event } A$$

???
No, as it is already implied by the existing axioms. 


---
class: center
# Propositions

$$\text{P}(A) + \text{P}(A^c) = 1, \;\text{for any event } A$$

--

<br>

$$ \text{P}(\Phi) = 0 $$

---
# Propositions

<!-- For any two events $A$ and $B$ -->

$$ \text{P}(A \cup B) = \text{P}(A) + \text{P}(B) - \text{P}(A \cap B), $$

$$\text{for any events $A$ and $B$}$$

--

# Exercise

Assume we know the following

- 75% of the students use Facebook
- 35% use Twitter
- 25% use both

We randomly select a student. 

What is the probability that 

- they use neither? 

--

- they use one but not the other?
