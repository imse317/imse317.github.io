# Discrete probability law

If the sample space $\Omega$ consists of a finite number of possible outcomes, 

then the probability of any event $\\{s_1, s_2, \cdots, s_k \\}$ 

is the sum of the probabilities of its elements.

<br>

$$\text{P}\big(\\{s_1, s_2, \cdots, s_k \\}\big) = \text{P}(s_1) + \text{P}(s_2) + \cdots + \text{P}(s_k) $$

---
# Discrete uniform probability law

If all outcomes in the sample space $\Omega$ are equally likely,

then the probability of any event $A$ is given by:

$$ \text{P}(A) = \frac{\text{number of outcomes in } A}{\text{number of outcomes in } \Omega} $$

--

<br>

For convenience, we use $|A|$ to denote the .red[number of elements] in set $A$ (termed the [cardinality](https://en.wikipedia.org/wiki/Cardinality) of set $A$)

$$ \text{P}(A) = \frac{|A|}{|\Omega|} $$

---
# Equally likely outcomes

In many experiments, it is reasonable to assume equal probabilities to all simple events.

--

<br>

Roll a fair six-sided die 🎲

$$ \text{P}(⚀) = \text{P}(⚁) = \text{P}(⚂) = \text{P}(⚃) = \text{P}(⚄) = \text{P}(⚅) = \frac{1}{6} $$

$$\text{P}(\text{odd number})=\text{P}\big(\\{⚀, ⚂, ⚄\\}\big)=\frac{3}{6}$$

---
Draw a card from a well-shuffled deck of 52 cards.

What is the chance to draw an ace? a spade?

.center[![:scale 75%](../images/deck-cards.png)]

--

$$
\begin{aligned}
\text{P}(\text{Aces}) = \text{P}\big(\\{🃑, 🃁, 🂱, 🂡\\}\big) &= \frac{4}{52}= \frac{1}{13} \\\
\\\
\text{P}(\text{spades}) = \text{P}\big(\\{🂡, 🂢, \cdots, 🂮\\}\big)&= \frac{13}{52}= \frac{1}{4} \\\
\end{aligned}
$$

# The product rule

.center[![:scale 22%](../images/3by4-tree.png)]

--

Suppose that

- there are $\large{\color{red}{n_1}}$ possible results at the first stage

- for every possible result at the first stage, there are $\large{\color{green}{n_2}}$ possible results at the second stage

then the total number of possible results is 
$\large{\color{red}{n_1} \times \color{green}{n_2}}$

<!-- $$\require{color}\colorbox{yellow}{$n_1 \times n_2$}$$. -->

???
The product rule is sometimes also called the multiplication principle.

---
# The product rule: four stages

![:scale 45%](../images/tree-4stages.png)

---
### General form: the product rule with $r$-stages

If for any sequence of possible results at the first $(i-1)$ stages,
there are $n_i$ possible results at the $i$-th stage

then the total number of possible results in a $r$-stage process is 

$$n_1 \times n_2 \times \cdots \times n_r$$
