# Sample space

--

Probability starts with a sample space, which is a set that describes .red[all possible outcomes in an experiment].

It must be [collectively exhaustive](https://en.wikipedia.org/wiki/Collectively_exhaustive_events) 
& [mutually exclusive](https://en.wikipedia.org/wiki/Mutual_exclusivity).

--

- Flip a coin once
![:scale 3.8%](../images/coin_heads.png)
&nbsp;

--
$$\Omega = \\{\text{heads, tails}\\}$$

--

- Flip a coin twice
![:scale 3.8%](../images/coin_heads.png)
![:scale 3.8%](../images/coin_tails.png)

--

$$
\begin{align}
\Omega = \\{&(\text{heads, heads}), (\text{tails, tails}), \\\
&(\text{heads, tails}), \;\;(\text{tails, heads}) \\} \\\
\end{align}
$$

---
# Sample space

- Roll a six-sided die once 🎲

--

$$\Omega = \\{ ⚀, ⚁, ⚂, ⚃, ⚄, ⚅ \\}$$

--

- Roll a six-sided die twice 🎲🎲

--

$$
\begin{aligned}
\Omega = \\{&⚀⚀, ⚀⚁, ⚀⚂, ⚀⚃, ⚀⚄, ⚀⚅, \\\
            &⚁⚀, ⚁⚁, ⚁⚂, ⚁⚃, ⚁⚄, ⚁⚅, \\\
            &⚂⚀, ⚂⚁, ⚂⚂, ⚂⚃, ⚂⚄, ⚂⚅, \\\
            &⚃⚀, ⚃⚁, ⚃⚂, ⚃⚃, ⚃⚄, ⚃⚅, \\\
            &⚄⚀, ⚄⚁, ⚄⚂, ⚄⚃, ⚄⚄, ⚄⚅, \\\
            &⚄⚀, ⚄⚁, ⚄⚂, ⚄⚃, ⚄⚄, ⚄⚅ \\}
\end{aligned}
$$

# Event

.red[A collection of outcomes in the sample space] 

--

Or simply, a .green[subset] of the sample space.

--

- Event $A$: Roll a die 🎲, it lands on an odd number. 

--

$$A = \\{ ⚀, ⚂, ⚄ \\}$$

--

- Event $B$: Roll two dice 🎲🎲, the total is under 7.

--

$$B = \\{ 2, 3, 4, 5, 6\\}$$

--

- Event $C$: Making at least one free throw out of two

--

$$C=\\{(\text{hit, hit}), (\text{hit, miss}), (\text{miss, hit})\\}$$


---
# .red[Simple] & .green[compound] event

--

A .red[simple] event consists of .red[a single outcome].

--

A .green[compound] event consists of .green[multiple outcomes].

--

- Roll a die 🎲, it lands on an odd number.

--
$$\\{ ⚀, ⚂, ⚄ \\}$$

--

- Roll two dice 🎲🎲 and get a double.

--

$$\\{(⚀,⚀), (⚁, ⚁), (⚂, ⚂), (⚃, ⚃), (⚄, ⚄), (⚅, ⚅) \\}$$

--

- Roll two dice 🎲🎲, the total is 12.

--
$$\\{ (⚅, ⚅) \\}$$
