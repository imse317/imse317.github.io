# Combinations - an .red[unordered] subset

Choose 3 students from 40 to form a committee.

How many possible ways to form the committee? 

???
$$\begin{aligned}
\text{number of unordered list}&=\frac{3\text{-permutations of }40}{\text{permutations of }3} \\\
\\\
&=\frac{40!}{3!(40-3)!} \\\
\\\
&=9,880
\end{aligned}$$

# General formula for combinations

<br>
The number of ways of choosing $k$ objects out of $n$ is

<br>

$$\begin{aligned}
{n \choose k}&=\frac{k\text{-permutations of }n}{\text{permutations of }k} \\\
\\\
&=\frac{n!}{k!(n-k)!} \\\
\end{aligned}$$

# [Birthday problem](https://en.wikipedia.org/wiki/Birthday_problem)

.center[![:scale 70%](../images/birthday.png)]

How many people would it take to have a 50-50 chance that at least two of them share the same birthday?

---
# [Birthday problem](https://en.wikipedia.org/wiki/Birthday_problem)

Another way to describe it:

There are $n$ people at a party. 

How likely at least two of them share their birthday?

--

Assumptions

- Everyone has an equal probability of being born on any day in the year, independent of everyone else. 

--

- Ignore February 29th from leap years.

---

$$
\text{P(sharing birthday)}=1-\frac{365!}{(365-n)!\cdot 365^n}
$$

Go to [Google Colab](https://colab.research.google.com/) and sign in.

Open a new notebook.


```
import math

n = 40  # number of people at a party

p = 1 - math.factorial(365) / math.factorial(365-n) / (365**n)

print(p)
```
