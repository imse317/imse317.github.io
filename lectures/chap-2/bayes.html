---

By the definition of conditional probability 

$$\text{P}(A \mid B)=\frac{\text{P}(A \cap B)}{\text{P}(B)}$$

--

By the multiplication rule

$$\text{P}(A \cap B) = \text{P}(A) \cdot \text{P}(B \mid A)$$

--

Then, we have

$$\text{P}(A \mid B)=\frac{\text{P}(A) \cdot \text{P}(B \mid A)}{\text{P}(B)}$$


---
# Bayes' rule

Let $A_1, A_2, \cdots, A_n$ form a partition of sample space $\Omega$.

Then, for any event \\(B\\) such that \\(\text{P}(B)>0\\), we have

<br>

$$\text{P}(A_i \mid B) = \frac{\text{P}(A_i) \; \text{P}(B \mid A_i)}{\text{P}(B)}$$

$$\text{where}$$

$$\small{\text{P}(B) = \text{P}(A_1) \; \text{P}(B | A_1) + \text{P}(A_2) \; \text{P}(B | A_2) +  \cdots + \text{P}(A_n) \; \text{P}(B | A_n)}$$

# The false positive puzzle

- 1 in 1,000 people is afflicted with a rare disease for which a diagnostic test has been developed. 

- When an individual has the disease, it would test positive (i.e., state disease present) .red[99%] of the time.

- When an individual does not have the disease, it would test negative .red[98%] of the time. 

- A person just tested positive.

- What is the chance this person has the disease?

---
# Signal detection terminologies

| | &nbsp;&nbsp;&nbsp;&nbsp;Test positive &nbsp;&nbsp;&nbsp;&nbsp;| &nbsp;&nbsp;&nbsp;&nbsp;Test negative&nbsp;&nbsp;&nbsp;&nbsp;|
|:---:|:---:|:---:|
|&nbsp;&nbsp;&nbsp;&nbsp;Has disease&nbsp;&nbsp;&nbsp;&nbsp;|True positive <br> (hit)<br>$a$|False negative <br> (miss)<br>$b$|
|Does not <br> have disease|False positive <br> (false alarm)<br>$c$|True negative<br><br>$d$|

--

$$\begin{aligned}
\text{sensitivity (or recall)}&=\frac{a}{a+b} \\\
\\\
\text{specificity}&=\frac{d}{c+d} \\\
\end{aligned}$$

- $B$: Someone tested .red[positive].
- $B^c$: Someone tested .green[negative].

# Bayes' rule in odds form

<br>
$$\begin{align}
\text{P}(A \mid B) &= \frac{\text{P}(A) \; \text{P}(B \mid A)}{\text{P}(B)} \\\
\\\
\text{P}(A^c \mid B) &= \frac{\text{P}(A^c) \; \text{P}(B \mid A^c)}{\text{P}(B)} \\\
\\\
\frac{\text{P}(A \mid B)}{\text{P}(A^c \mid B)} &= \frac{\text{P}(A)}{\text{P}(A^c)} \cdot \frac{\text{P}(B \mid A)}{\text{P}(B \mid A^c)} \\\
\end{align}
$$

# Previous coin toss problem

- $A_1$: .red[regular] coin is chosen
- $A_2$: .red[two-headed] coin is chosen
- $A_3$: .red[two-tailed] coin is chosen
- $B$: coin landed on heads

Given $B$ has occurred, should you bet on $A_1$ or $A_2$?


$$\frac{\text{P}(A_1 \mid B)}{\text{P}(A_2 \mid B)} = \frac{\text{P}(A_1)}{\text{P}(A_2)} \cdot \frac{\text{P}(B \mid A_1)}{\text{P}(B \mid A_2)}$$
