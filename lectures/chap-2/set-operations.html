# .red[Union] of two events $A$ and $B$

The event consisting of all outcomes that are either in $A$ or in $B$.

Notation: $A \cup B$ &nbsp;&nbsp;(Reads: $A \text{ union } B$)

--

Roll a six-sided die

$$
\begin{aligned}
A &= \\{ 5, 6 \\} \\\
\\\
B &= \\{ 1, 3, 5 \\} \\\
\\\
A \cup B &= \\\
\end{aligned}
$$

---
# .red[Intersection] of two events $A$ and $B$

The event consisting of all outcomes that are in both $A$ and $B$.

Notation: $A \cap B$ &nbsp;&nbsp;(Reads: $A \text{ intersect } B$)

--

Roll a six-sided die

$$\begin{aligned}
A &= \\{ 5, 6 \\} \\\
\\\
B &= \\{ 1, 3, 5 \\} \\\
\\\
A \cap B &=
\end{aligned}$$

# Commutative laws

$$ a + b = b + a $$

$$ a \times b = b \times a $$

--

<br>
$$ A \cup B = B \cup A $$

--

$$ A \cap B = B \cap A $$

---
# Associative laws

$$ (a + b) + c = a + (b + c) $$
$$ (a \times b) \times c = a \times (b \times c) $$

--

<br>
$$ (A \cup B) \cup C = A \cup (B \cup C) $$

--

$$ (A \cap B) \cap C = A \cap (B \cap C) $$

---
# Distributive laws

$$ (a + b) \times c = (a \times c) + (b \times c) $$

--

<br>
$$ (A \cup B) \cap C = (A \cap C) \cup (B \cap C) $$

--

$$ (A \cap B) \cup C = (A \cup C) \cap (B \cup C) $$


---
# Mutually exclusive (or disjoint) events

Null event $\Phi$: the event consisting of no outcomes. 

--

$A$ and $B$ are mutually exclusive or disjoint events if they do not share any outcome, or simply

$$A \cap B=\Phi$$ 

--

Roll a six-sided die

$$\begin{aligned}
A &= \\{ 1, 3, 5\\} \text{ (odd numbers)} \\\
\\\
B &= \\{ 2, 4, 6 \\} \text{ (even numbers)} \\\
\\\
A \cap B &= \Phi \\\
\end{aligned}$$


---
# .red[Complement] of an event $A$

The set of all outcomes in $\Omega$ that are not in $A$.

Notation: $A^c$ &nbsp;&nbsp;(Reads: $A \text{ complement}$)

--

By definition, 

$$\begin{aligned}
A \cap A^c = \Phi \\\
A \cup A^c = \Omega \\\
\end{aligned}$$
