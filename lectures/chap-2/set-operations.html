# [Union](https://en.wikipedia.org/wiki/Union_%28set_theory%29) of two events $A$ and $B$

The event consisting of all outcomes that are 

.center[.red[either in $A$ or in $B$.]]

.gray[Notation:] $A \cup B$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;.gray[Reads:] $A \text{ union } B$

--

Roll a six-sided die

$$
\begin{aligned}
A &= \\{ 5, 6 \\} \\\
\\\
B &= \\{ 1, 3, 5 \\} \\\
\\\
A \cup B &= \\\
\end{aligned}
$$

# [Intersection](https://en.wikipedia.org/wiki/Intersection_%28set_theory%29) of two events $A$ and $B$

The event consisting of all outcomes that are 

.center[.red[in both $A$ and $B$.]]

.gray[Notation:] $A \cap B$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;.gray[Reads:] $A \text{ intersect } B$

--

Roll a six-sided die

$$\begin{aligned}
A &= \\{ 5, 6 \\} \\\
\\\
B &= \\{ 1, 3, 5 \\} \\\
\\\
A \cap B &=
\end{aligned}$$

# [Commutative property](https://en.wikipedia.org/wiki/Commutative_property)

$$ a + b = b + a $$

--

$$ a \times b = b \times a $$

--

<br>
$$ A \cup B = B \cup A $$

--

$$ A \cap B = B \cap A $$

---
# [Associative property](https://en.wikipedia.org/wiki/Associative_property)

$$ (a + b) + c = a + (b + c) $$
$$ (a \times b) \times c = a \times (b \times c) $$

--

<br>
$$ (A \cup B) \cup C = A \cup (B \cup C) $$

--

$$ (A \cap B) \cap C = A \cap (B \cap C) $$

---
# [Distributive property](https://en.wikipedia.org/wiki/Distributive_property)

$$ (a + b) \times c = (a \times c) + (b \times c) $$

--

<br>
$$ (A \cup B) \cap C = (A \cap C) \cup (B \cap C) $$

--

$$ (A \cap B) \cup C = (A \cup C) \cap (B \cup C) $$

# Mutually exclusive (or disjoint) events

Null event $\Phi$: the event consisting of no outcomes. 

--

$A$ and $B$ are mutually exclusive or disjoint events if they do not share any outcome, or simply

$$A \cap B=\Phi$$ 

--

Roll a six-sided die

$$\begin{aligned}
A &= \\{ 1, 3, 5\\} \text{ (odd numbers)} \\\
\\\
B &= \\{ 2, 4, 6 \\} \text{ (even numbers)} \\\
\\\
A \cap B &= \Phi \\\
\end{aligned}$$


---
# [Complement](https://en.wikipedia.org/wiki/Complement_%28set_theory%29) of an event $A$

The set of all outcomes in $\Omega$ that are not in $A$.

.gray[Notation:] $A^c$ &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; .gray[Reads:] $A \text{ complement}$

--

By definition, 

$$A \cap A^c = \Phi$$

--

$$A \cup A^c = \Omega$$

--

Roll a six-sided die.

$$\begin{aligned}
A &= \\{ 5, 6 \\} \\\
\\\
A^c &= \\\
\end{aligned}$$


---
# [Subset](https://en.wikipedia.org/wiki/Subset)

An event $A$ is a .red[subset] of an event $B$ if all outcomes in $A$ are also outcomes in $B$. 

.gray[Notation:] $ A \subset B $


--

Roll a six-sided die

$$\begin{aligned}
A &= \\{ 1, 3, 5\\} \text{ (odd numbers)} \\\
\\\
B &= \\{ 1, 2, 3, 4, 5 \\} \text{ (less than 6)} \\\
\\\
A &\subset B \\\
\end{aligned}$$
