# Partition of a sample space $\Omega$

.center[![:scale 36%](../images/partition.png)]


If a collection of events are 

- disjoint (i.e., [mutually exclusive](https://en.wikipedia.org/wiki/Mutual_exclusivity)) 
- their union is $\Omega$ (i.e., [collectively exhaustive](https://en.wikipedia.org/wiki/Collectively_exhaustive_events)) 

then this collection of events is called a .red[partition] of $\Omega$. 

--

This means any outcome in an experiment is included in .green[one and exactly one] of the partitioning events.


---
# Partition of sample space $\Omega$

<br>

.center[![:scale 30%](../images/venn-compliment.png)]


$A$ and $A^c$ always form a partition of sample space $\Omega$.

---
# Total probability theorem

Let $A_1, A_2, \cdots, A_n$ form a partition of sample space $\Omega$.

.center[![:scale 33%](../images/partition-4.png)]

Then, for any event $B$, we have

$$B = (A_1 \cap B) \cup (A_2 \cap B) \cup \cdots \cup (A_n \cap B)$$

--

.center[&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;![:scale 40%](../images/partition-total-prob.png)]

---
<!-- # Total probability theorem -->

.center[![:scale 40%](../images/partition-total-prob.png)]

--

$$
\small{
\begin{aligned}
B =\;& (A_1 \cap B) \cup (A_2 \cap B) \cup \cdots \cup (A_n \cap B) \\\
\\\
\text{P}(B) =\;& \text{P}\big((A_1 \cap B) \cup (A_2 \cap B) \cup \cdots \cup (A_n \cap B)\big)\\\
\\\
=\;& \text{P}(A_1 \cap B) + \text{P}(A_2 \cap B) + \cdots + \text{P}(A_n \cap B)\\\
\\\
=\;& \text{P}(A_1)\text{P}(B \mid A_1) + \text{P}(A_2)\text{P}(B \mid A_2) + \cdots + \text{P}(A_n)\text{P}(B \mid A_n) \\\
\end{aligned}
}
$$

--

.center[.large[.red[Divide and conquer]]]

# Exercise

You enter a tennis tournament. 

Your probability of winning a game is 

- 0.3 against .green[half of] the (stronger) players
- 0.5 against .green[a quarter of] the (similar-level) players
- 0.6 against .green[a quarter of] the (weaker) players

You play a game against a randomly chosen opponent. 

What is the probability of you winning the game?

# The Monty Hall problem

.center[![:scale 100%](../images/montyhall.png)]

---

# Assumptions

- Monty knows which room has the car.

--

- He always opens one of the two unchosen doors .red[that does not have the car].

--

- If both unchosen doors do not have the car (i.e., your first choice is correct), Monty opens one of the two doors at random. 

--

- You want the car, not 🐐.
