# Permutation

An .red[ordering] of distinguishable objects

<br><br><br>
![:scale 80%](../images/permutation-slots.png)


???
$$
\begin{aligned}
\text{Permutations of }n &= n \times (n-1) \times (n-2) \times \cdots \times 2 \times 1 \\\
\\\
&=n! \\\
\end{aligned}
$$

# $k$-permutations of $n$ objects

$$ n \times (n-1) \times (n-2) \times \cdots \times (n-k+1) $$

???
$$
\begin{aligned}
&n \times (n-1) \times (n-2) \times \cdots \times (n-k+1) \\\
\\\
=& \frac{n \times (n-1) \times (n-2) \times \cdots \times (n-k+1)}{1} \\\
\\\
=& \frac{n \times (n-1) \times (n-2) \times \cdots \times (n-k+1) \times (n-k) \times (n-k-1) \times \cdots \times 2 \times 1}{(n-k) \times (n-k-1) \times \cdots \times 2 \times 1} \\\
\\\
=& \frac{n!}{(n-k)!} \\\
\end{aligned}
$$

- $n_2$ rock songs
