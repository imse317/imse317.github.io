# [Covariance](https://en.wikipedia.org/wiki/Covariance)

It measures the degree to which two RVs .red[vary together]. 

- People's height & weight

# Covariance

The covariance between two RVs $\color{red}{X}$ and $\color{blue}{Y}$:

$$\text{cov}(\color{red}{X}, \color{blue}{Y})\stackrel{\text{def}}{=}\text{E}\big[\big(\color{red}{X}-\text{E}[\color{red}{X}]\big)\cdot\big(\color{blue}{Y}-\text{E}[\color{blue}{Y}]\big)\big]$$

--

.center[
![:scale 32%](../images/cov-pos.png)
![:scale 32%](../images/cov-neg.png)
![:scale 32%](../images/cov-zero.png)
]

--

<br>

If $\text{cov}(X, Y)=0$, we say $X$ and $Y$ are .green[uncorrelated].   

---
# Properties

$$\text{cov}(X, X)=\text{var}(X)$$

--

Proof

$$
\begin{aligned}
\text{cov}(X, X)&=\text{E}\big[(X-\text{E}[X])(X-\text{E}[X])\big] \\\
\\\
&=\text{E}\big[(X-\text{E}[X])^2\big] \\\
\\\
&=\text{var}(X) \;\;\; \color{gray}{\leftarrow\text{by the definition of variance}}\\\
\end{aligned}
$$

---
# Properties

$$\text{cov}(X, Y)=\text{E}[XY]-\text{E}[X]\text{E}[Y]$$

.center[A shortcut formula to calculate covariance]

--

Proof

$$
\begin{aligned}
\text{cov}(X, Y)&=\text{E}\big[(X-\text{E}[X])(Y-\text{E}[Y])\big] \\\
\\\
&=\text{E}\big[XY-\text{E}[X]Y-\text{E}[Y]X+\text{E}[X]\text{E}[Y]\big] \\\
\\\
&=\text{E}[XY]-\text{E}[X]\text{E}[Y]-\text{E}[Y]\text{E}[X]+\text{E}[X]\text{E}[Y] \\\
\\\
&=\text{E}[XY]-\text{E}[X]\text{E}[Y] \\\
\end{aligned}
$$

---
$X$: whether they are a current smoker

$Y$: whether they will develop lung cancer at some point

| |&nbsp;&nbsp;&nbsp;&nbsp;$Y=0$&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;$Y=1$&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;$p_X(x)$&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;|
|:---:|:---:|:---:|:---:|
|&nbsp;&nbsp;&nbsp;&nbsp;$X=0$&nbsp;&nbsp;&nbsp;&nbsp;|$72\%$|$3\%$|$75\%$|
|&nbsp;&nbsp;&nbsp;&nbsp;$X=1$&nbsp;&nbsp;&nbsp;&nbsp;|$20\%$|$5\%$|$25\%$|
|$p_Y(y)$|$92\%$|$8\%$|$100\%$|

What is the covariance between $X$ and $Y$?

---

# Properties


$$\text{cov}(aX+b, Y)=a\cdot\text{cov}(X, Y),$$
$$\text{for any constants $a$ and $b$.}$$

--

Proof

$$
\begin{aligned}
\text{cov}(aX+b, Y)&=\text{E}\big[(aX+b-\text{E}[aX+b])(Y-\text{E}[Y])\big] \\\
\\\
&=\text{E}\big[(aX+b-a\text{E}[X]-b)(Y-\text{E}[Y])\big] \\\
\\\
&=a\cdot\text{E}\big[(X-\text{E}[X])(Y-\text{E}[Y])\big] \\\
\\\
&=a\cdot\text{cov}(X, Y) \\\
\end{aligned}
$$

---

# Properties


$$\text{cov}(aX+b, Y)=a\cdot\text{cov}(X, Y),$$
$$\text{for any constants $a$ and $b$.}$$

<br>

Similarly, we have

$$\text{cov}(X, aY+b)=a\cdot\text{cov}(X, Y),$$
$$\text{for any constants $a$ and $b$.}$$

---
# Commutative property

$$\text{cov}(X, Y)=\text{cov}(Y, X)$$

--
Proof

$$
\begin{aligned}
\text{cov}(X, Y)&=\text{E}\big[(X-\text{E}[X])(Y-\text{E}[Y])\big] \\\
\\\
&=\text{E}\big[(Y-\text{E}[Y])(X-\text{E}[X])\big] \\\
\\\
&=\text{cov}(Y, X) \\\
\end{aligned}
$$

---
# Distributive property

$$\text{cov}(X+Y, Z)=\text{cov}(X, Z)+\text{cov}(Y, Z)$$

--
Proof

$$
\small{
\begin{aligned}
&\;\text{cov}(X+Y, Z) \\\
=&\;\text{E}\big[(X+Y-\text{E}[X+Y])(Z-\text{E}[Z])\big] \;\;\; \color{gray}{\leftarrow\text{by def. of cov}} \\\
=&\;\text{E}\big[(X-\text{E}[X]+Y-\text{E}[Y])(Z-\text{E}[Z])\big] \\\
=&\;\text{E}\big[(X-\text{E}[X])(Z-\text{E}[Z])+(Y-\text{E}[Y])(Z-\text{E}[Z])\big] \\\
=&\;\text{E}\big[(X-\text{E}[X])(Z-\text{E}[Z])\big]+\text{E}\big[(Y-\text{E}[Y])(Z-\text{E}[Z])\big] \\\
=&\;\text{cov}(X, Z)+\text{cov}(Y, Z) \\\
\end{aligned}
}
$$

---
# Distributive property (cont'd)

<br>

Similarly, we have

$$
\begin{aligned}
\text{cov}(X, Y+Z)=&\;\text{cov}(X, Y)+\text{cov}(X, Z) \\\
\\\
\text{cov}(X+Y, Z+W)=&\;\text{cov}(X, Z) + \\\
&\; \text{cov}(Y, Z)+ \\\
&\; \text{cov}(X, W)+ \\\
&\; \text{cov}(Y, W) \\\
\end{aligned}
$$



---
# Properties

$$
\text{var}(X+Y)=\text{var}(X)+\text{var}(Y)+2\text{cov}(X, Y)
$$

--
Proof

$$
\small{
\begin{aligned}
&\;\text{var}(X+Y) \\\
=&\;\text{E}\bigg[\big(X+Y-\text{E}[X+Y]\big)^2\bigg] \;\;\; \color{gray}{\leftarrow\text{by definition of variance}} \\\
=&\;\text{E}\bigg[\big(X-\text{E}[X]+Y-\text{E}[Y]\big)^2\bigg] \\\
=&\;\text{E}\bigg[\big(X-\text{E}[X]\big)^2+\big(Y-\text{E}[Y]\big)^2+2\big(X-\text{E}[X]\big)\big(Y-\text{E}[Y]\big)\bigg] \\\
=&\;\text{E}\big[(X-\text{E}[X])^2\big]+\text{E}\big[(Y-\text{E}[Y])^2\big] +2\text{E}\big[(X-\text{E}[X])(Y-\text{E}[Y])\big] \\\
=&\;\text{var}(X)+\text{var}(Y)+2\text{cov}(X, Y) \\\
\end{aligned}
}
$$

---
# Properties

$$
\text{var}(X+Y)=\text{var}(X)+\text{var}(Y)+2\text{cov}(X, Y)
$$


We can also write it as
$$
\begin{aligned}
\text{var}(X+Y) =& \text{cov}(X, X) + \\\
                 & \text{cov}(Y, Y) + \\\
                 & \text{cov}(X, Y) + \\\
                 & \text{cov}(Y, X)
\end{aligned}
$$

---
# Properties

$$
\begin{aligned}
\text{var}(X+Y)&=\text{var}(X)+\text{var}(Y)+2\text{cov}(X, Y) \\\
\\\
\text{var}(X-Y)&=? \\\
\end{aligned}
$$

--

<br>

If we replace $Y$ with $-Y$

$$
\begin{aligned}
\text{var}(X-Y)&=\text{var}(X)+\text{var}(-Y)+2\text{cov}(X, -Y) \\\
\\\
&=\text{var}(X)+(-1)^2\text{var}(Y)-2\text{cov}(X, Y) \\\
\\\
&=\text{var}(X)+\text{var}(Y)-2\text{cov}(X, Y) \\\
\end{aligned}
$$



---
# Independence

If two RVs $X$ and $Y$ are independent, 

$$\text{cov}(X, Y)=0$$

--
Proof

$$\text{cov}(X, Y)=\text{E}[XY]-\text{E}[X]\text{E}[Y]=0$$

--

- Independent random variables are uncorrelated. 

--

- Are uncorrelated random variables independent?

--

  - Not necessarily. 
  - Uncorrelated RVs may not be independent. 



---

$$X \sim \text{N}(0, 1),\;\;\;\;\;\; Y =  X^2$$


--

$$
\begin{aligned}
\text{cov}(X, Y)&=\text{E}[XY]-\text{E}[X]\text{E}[Y] \\\
&=\text{E}\big[X \cdot X^2\big] - 0 \cdot \text{E}\big[X^2\big] \\\
&=\text{E}\big[X^3\big] \\\
\\\
&=\int_{-\infty}^{+\infty} z^3(\frac{1}{\sqrt{2\pi}}e^{-\frac{z^2}{2}})dz \\\
\\\
&=0
\end{aligned}
$$

--
.center[$X$ and $Y$ are uncorrelated.]

--

.center[Are $X$ and $Y$ independent?]



???
They are not independent.

In fact, knowing $X$ gives us complete info about $Y$.

---
# Uncorrelated but dependent 

$$X \sim \text{N}(0, 1), \;\;\;\;Y =  X^2, \;\;\;\;\text{cov}(X, Y)=0$$

.center[![:scale 45%](../images/uncorrelated-ind.png)]


Covariance is a measure of .red[linear] relationship. 

Random variables can be dependent in nonlinear ways, and still have zero covariance. 

---
# Independence

If $X$ and $Y$ are independent, then

$$\text{var}(X + Y)=\text{var}(X) + \text{var}(Y)$$


Proof

$$
\begin{aligned}
\text{var}(X+Y)&=\text{var}(X)+\text{var}(Y)+2\text{cov}(X, Y) \\\
\\\
&=\text{var}(X)+\text{var}(Y)+2\cdot 0 \\\
\\\
&=\text{var}(X)+\text{var}(Y) \\\
\end{aligned}
$$



---
# [Correlation coefficient](https://en.wikipedia.org/wiki/Pearson_correlation_coefficient)

The .red[correlation coefficient] (or simply, .red[correlation]) between two RVs $X$ and $Y$:

$$\rho_{X, Y} \stackrel{\text{def}}{=} \frac{\text{cov}(X, Y)}{\sqrt{\text{var}(X)\text{var}(Y)}}$$

--
We can rewrite it as 

$$\rho_{X, Y} \stackrel{\text{def}}{=} \text{cov}\bigg(\frac{X-\text{E}[X]}{\sqrt{\text{var}(X)}}, \frac{Y-\text{E}[Y]}{\sqrt{\text{var}(Y)}} \bigg)$$

--

The correlation is the covariance after [standardization](https://en.wikipedia.org/wiki/Standard_score).


---
# Properties

$$\rho_{X, Y} \stackrel{\text{def}}{=} \text{cov}\bigg(\frac{X-\text{E}[X]}{\sqrt{\text{var}(X)}}, \frac{Y-\text{E}[Y]}{\sqrt{\text{var}(Y)}} \bigg)$$

.center[$\rho$ is dimensionless.]

--

<br>

For any constants $a$ and $b$

$$
\begin{aligned}
\text{cov}(aX+b, Y)&=a\cdot\text{cov}(X, Y) \\\
\\\
\rho(aX+b, Y)&=\rho(X, Y) \\\
\end{aligned}
$$

--

Scaling a variable does not change the correlation. 

???
Proof

$$
\begin{aligned}
\rho(aX+b, Y)&= \frac{\text{cov}(aX+b, Y)}{\sqrt{\text{var}(aX+b)\text{var}(Y)}} \\\
\\\
&= \frac{a\cdot\text{cov}(X, Y)}{\sqrt{a^2\text{var}(X)\text{var}(Y)}} \\\
\\\
&= \frac{\text{cov}(X, Y)}{\sqrt{\text{var}(X)\text{var}(Y)}} \\\
\\\
&=\rho(X, Y) \\\
\end{aligned}
$$

---
# Correlation bounds

For any two RVs $X$ and $Y$, we have

$$-1 \leq \rho(X, Y) \leq 1$$

--

<br>

$$
\begin{aligned}
\rho=1, & \;\text{iff (if and only if) $Y=aX+b$ with $a>0$.} \\\
\\\
\rho=-1, & \;\text{iff $Y=aX+b$ with $a < 0$.} \\\
\end{aligned}
$$


???
Proof

$$
\small{
\begin{aligned}
&\;\text{var}\bigg(\frac{X}{\sqrt{\text{var}(X)}}+\frac{Y}{\sqrt{\text{var}(Y)}}\bigg) \\\
\\\
=&\;\text{var}\bigg(\frac{X}{\sqrt{\text{var}(X)}}\bigg)+\text{var}\bigg(\frac{Y}{\sqrt{\text{var}(Y)}}\bigg) \\\
&+2\text{cov}\bigg(\frac{X}{\sqrt{\text{var}(X)}}, \frac{Y}{\sqrt{\text{var}(Y)}}\bigg) \\\
\\\
=&\;1+1+2\rho \\\
\\\
\geq&\; 0
\end{aligned}
}
$$

So 

$$\rho \geq -1$$

Similarly, 

$$
\small{
\begin{aligned}
&\;\text{var}\bigg(\frac{X}{\sqrt{\text{var}(X)}}-\frac{Y}{\sqrt{\text{var}(Y)}}\bigg) \\\
\\\
=&\;\text{var}\bigg(\frac{X}{\sqrt{\text{var}(X)}}\bigg)+\text{var}\bigg(\frac{Y}{\sqrt{\text{var}(Y)}}\bigg) \\\
&-2\text{cov}\bigg(\frac{X}{\sqrt{\text{var}(X)}}, \frac{Y}{\sqrt{\text{var}(Y)}}\bigg)\\\
\\\
=&\;1+1-2\rho \\\
\\\
\geq&\; 0
\end{aligned}
}
$$

So 

$$\rho \leq 1$$

Lastly, 

$$
\begin{aligned}
\rho(X, aX+b)&= \frac{\text{cov}(X, aX+b)}{\sqrt{\text{var}(X)\text{var}(aX+b)}} \\\
\\\
&= \frac{a\cdot\text{cov}(X, X)}{\sqrt{a^2\text{var}(X)\text{var}(X)}} \\\
\\\
&= \frac{a}{|a|} \\\
\end{aligned}
$$

---

Population covariance & correlation

$$
  \begin{aligned}
  \text{cov}(X, Y)&=\text{E}\big[\big(X-\text{E}[X]\big)\big(Y-\text{E}[Y]\big)\big] \\\
  \\\
  \rho&=\frac{\text{cov}(X, Y)}{\sqrt{\text{var}(X) \text{var}(Y)}} \\\
  \end{aligned}
$$

--
Sample covariance & correlation

$$
  \begin{aligned}
  \text{cov}(x, y)&=\frac{\sum(x_i-\bar{x})(y_i-\bar{y})}{n-1} \\\
  \\\
  r&=\frac{\sum(x_i-\bar{x})(y_i-\bar{y})}{\sqrt{\sum(x_i-\bar{x})^2\sum(y_i-\bar{y})^2}} \\\
  \end{aligned}
$$

---

$$\large{r=\frac{\sum(x_i-\bar{x})(y_i-\bar{y})}{\sqrt{\sum(x_i-\bar{x})^2\sum(y_i-\bar{y})^2}}}$$

$r$ measures the .red[linear relationship] between $x$ and $y$.

# Calculate correlation with Python

```
import numpy as np
import pandas as pd
import seaborn as sns

url = "https://imse317.github.io/data/advertising.csv"
df = pd.read_csv(url)
df.head()
```

```
# examine the relationship between TV budget and sales
sns.scatterplot(x="TV", y="sales", data=df)
```

---
<!-- # Calculate correlation with Python -->

```
# manually calculating correlation coefficient r

x = df["TV"]
y = df["sales"]

Sxy = sum((x - x.mean()) * (y - y.mean()))
Sxx = sum((x - x.mean())**2)     # **2 is to square
Syy = sum((y - y.mean())**2)

r = Sxy / np.sqrt(Sxx * Syy)     # correlation formula 

print(r)
```

```
# alternatively, we can use the pandas corr method
df[["TV", "sales"]].corr()
```
