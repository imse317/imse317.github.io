---

For discrete RVs $\color{red}{X}$ and $\color{blue}{Y}$, the marginal PMFs are

$$p_\color{red}{X}(\color{red}{x})=\sum_\color{blue}{y} p_{X, Y}(x, y)$$

$$p_\color{blue}{Y}(\color{blue}{y})=\sum_\color{red}{x} p_{X, Y}(x, y)$$

--

For continuous RVs $\color{red}{X}$ and $\color{blue}{Y}$, the marginal PDFs are

$$f_\color{red}{X}(\color{red}{x})=\int_{-\infty}^{+\infty} f_{X, Y}(x, y) d\color{blue}{y}$$

$$f_\color{blue}{Y}(\color{blue}{y})=\int_{-\infty}^{+\infty} f_{X, Y}(x, y) d\color{red}{x}$$

???
Integrate the joint PDF over all possible values of the other variable.


---

Let $(X, Y)$ be a random point on the unit square.

.center[![:scale 35%](../images/unit-square.png)]

What is its joint PDF?

--

$$f_{X, Y}(x, y) = 
\begin{cases}
    c, & \text{if $x, y \in [0, 1]$,} \\\
    0, & \text{otherwise.}
\end{cases}
$$

To satisfy the normalization property

$$
\begin{aligned}
&\int_{-\infty}^{+\infty} \int_{-\infty}^{+\infty} f_{X, Y}(x, y) dxdy \\\
\\\
=\;&\int_0^1 \int_0^1 c \; dxdy \\\
\\\
=\;&c \int_0^1 \int_0^1 1 \; dxdy \\\
\\\
=\;&c \\\
\end{aligned}
$$

--

We must set $c=1$.

---
<!-- The joint PDF: -->

$$f_{X, Y}(x, y) = 
\begin{cases}
    1, & \text{if $x, y \in [0, 1]$,} \\\
    0,              & \text{otherwise.}
\end{cases}
$$

<!-- .center[![:scale 18%](../images/unit-square.png)] -->

What is the marginal PDF of $X$?


--

If $x < 0$ or $x > 1$, 

$$f_X(x)=\int_{-\infty}^{+\infty} f_{X, Y}(x, y) dy =\int_{-\infty}^{+\infty} 0 \; dy=0$$

--

If $x \in [0, 1]$

$$
f_X(x)=\int_{-\infty}^{+\infty} f_{X, Y}(x, y) dy=\int_0^1 1 \; dy =1
$$

--

$$X \sim \text{unif}(0, 1)$$

# .red[Uniform] joint PDF

More generally, let $S$ be a subset of the 2-D plane.

The corresponding uniform joint PDF on $S$ is

$$f_{X, Y}(x, y) = 
\begin{cases}
    \frac{1}{\text{area of $S$}}, & \text{if $(x, y) \in S$,} \\\
    0,                           & \text{otherwise.}
\end{cases}
$$

.center[![:scale 30%](../images/joint-pdf-uniform.png)]

---

.center[![:scale 24%](../images/joint-pdf-uniform.png)]

$$
\small{
\begin{aligned}
\text{P}\big((X, Y) \in A\big)&=\iint\limits_{(x, y) \in A} f_{X, Y}(x, y) dxdy \\\
&=\iint\limits_{(x, y) \in A} \frac{1}{\text{area of $S$}} dxdy \\\
&=\frac{1}{\text{area of $S$}}\iint\limits_{(x, y) \in A} 1 \;dxdy \\\
&=\frac{\text{area of $A$}}{\text{area of $S$}} \\\
\end{aligned}
}
$$

# Uniform distribution on the unit square

$$f_{X, Y}(x, y) = 
\begin{cases}
    1, & \text{if $x, y \in [0, 1]$,} \\\
    0, & \text{otherwise.}
\end{cases}
$$

What is the probability that $X < Y$?

--

.center[
![:scale 28%](../images/unit-square.png)
&nbsp;
![:scale 28%](../images/unit-square-xy.png)
]

--

$$\text{P}(X < Y) = \frac{\text{area of yellow}}{\text{area of green}}= \frac{\frac{1}{2}}{1}=0.5$$

---
# Uniform distribution on the unit disk

Let $(X, Y)$ be a random point on the unit disk.

.center[![:scale 35%](../images/unit-disk.png)]

What is its joint PDF?

--

$$f_{X, Y}(x, y) = 
\begin{cases}
    1/\pi, & \text{if $x^2+y^2 \leq 1$,} \\\
    0,     & \text{otherwise.} \\\
\end{cases}
$$
