# [Law of Large Numbers (LLN)](https://en.wikipedia.org/wiki/Law_of_large_numbers)

Assume $X_1, X_2, \cdots, X_n$ are [i.i.d.](https://en.wikipedia.org/wiki/Independent_and_identically_distributed_random_variables)

(.red[i]ndependent and .red[i]dentically .red[d]istributed) RVs

with mean $\mu$ and variance $\sigma^2$.

$$\bar{X}_n \stackrel{\text{def}}{=} \frac{X_1+X_2+\cdots+X_n}{n}=\frac{1}{n}\sum_{i=1}^n X_i$$

--

Loosely speaking, the LLN states that
.red[with high probability, the sample mean $(\bar{X}_n)$ of many i.i.d. random variables is very close to the true mean $(\mu)$.] 

???
Note $\bar{X}$ is not a number, but a random variable. 

---

$$
\small{
\begin{aligned}
\bar{X}_n&=\frac{X_1+X_2+\cdots+X_n}{n} \\\
\\\
\text{E}[\bar{X}_n]&=\frac{\text{E}[X_1]+\text{E}[X_2]+\cdots+\text{E}[X_n]}{n}=\frac{n\mu}{n}=\mu \\\
\\\
\text{var}(\bar{X}_n)&=\frac{\text{var}(X_1)+\text{var}(X_2)+\cdots+\text{var}(X_n)}{n^2}=\frac{n\sigma^2}{n^2}=\frac{\sigma^2}{n} \\\
\end{aligned}
}
$$

--

We apply the Chebyshev inequality and obtain

$$\text{P}\big(|\bar{X}_n - \mu| \geq \epsilon \big) \leq \frac{\sigma^2}{n\epsilon^2}, \;\;\;\;\;\; \text{for all $\epsilon > 0$.}$$

For any fixed $\epsilon$, the right-hand side of the inequality approaches to zero as $n$ increases.  

---
# The (weak) Law of Large Numbers

Let $X_1, X_2, \cdots, X_n$ be i.i.d. RVs with mean $\mu$.

$$\require{color}\colorbox{yellow}{$\lim_{n\rightarrow +\infty}\text{P}\big(|\bar{X}_n - \mu| < \epsilon\big)=1, \;\;\;\; \text{for every $\epsilon >0$}.$}$$

--

We say the sequence $\bar{X}_n$ converges to $\mu$ in probability.

Does the LLN contradict with the [Gambler's fallacy](https://en.wikipedia.org/wiki/Gambler%27s_fallacy)?

--

.center[.red[No]]

The law works not by balancing out what has already happened, 
but by .red[diluting what has happened with new data], so that the past is less and less important.
