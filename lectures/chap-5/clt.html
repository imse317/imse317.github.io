# [Central Limit Theorem (CLT)](https://en.wikipedia.org/wiki/Central_limit_theorem)

Let $X_1, X_2, \cdots, X_n$ be i.i.d. random variables.

They all have mean $\mu$ and variance $\sigma^2$.

$$
\small{
\begin{aligned}
\bar{X}_n&=\frac{X_1+X_2+\cdots+X_n}{n} \\\
\\\
S_n&=X_1+X_2+\cdots+X_n \\\
\end{aligned}
}
$$

Then, if $n$ is large, 

$$
\small{
\begin{aligned}
\bar{X}_n &\text{ is approximately } \text{N}(\mu, \frac{\sigma^2}{n}) \\\
\\\
S_n &\text{ is approximately } \text{N}(n\mu, n\sigma^2) \\\
\end{aligned}
}
$$

---
# Central Limit Theorem (CLT)

If $n$ is large, 

$$
\begin{aligned}
\bar{X}_n &\text{ is approximately } \text{N}(\mu, \frac{\sigma^2}{n}) \\\
\\\
S_n &\text{ is approximately } \text{N}(n\mu, n\sigma^2) \\\
\end{aligned}
$$

The standardized version:

$$Z_n=\frac{\bar{X}_n-\mu}{\sigma/\sqrt{n}}=\frac{S_n-n\mu}{\sqrt{n}\sigma} \;\text{ is approximately } \text{N}(0, 1)$$

Not very big. Rule of thumb: $n > 30$.

# Exercise

An accountant rounds each transaction to the nearest dollar (e.g., from $8.63 to 9 dollars). 

Assume the error in rounding is $\text{unif}(-0.5, 0.5).$

What is the probability that the total error in 300 transaction entries is more than $5?
