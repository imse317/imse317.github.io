---
# Joint distribution – the discrete case

Example: randomly draw a person from a population and record their .red[age] and .green[\# of credit cards] they own. 

--

Two discrete RV $X$ and $Y$ from the same experiment.

$(x, y)$ is a pair of possible values of $X$ and $Y$.

--

The .red[joint PMF] of $X$ and $Y$ is defined as

$$p_{X, Y}(x, y)=\text{P}\big(\\{X=x\\} \cap \\{Y=y\\}\big)$$

--

For simplicity, we often use the abbreviated notation.

$$p_{X, Y}(x, y)=\text{P}(X=x, Y=y)$$

---
# Non-negativity

PMF of a single discrete RV $X$

$$p_X(x) \geq 0, \;\;\;\; \text{for all $x$.}$$

--

<br>

Joint PMF of two discrete RVs $X$ and $Y$

$$p_{X, Y}(x, y) \geq 0, \;\;\;\; \text{for all $x$ and $y$.}$$

---
# Normalization property

PMF of a single discrete RV $X$

$$\sum_x p_X(x)=1$$

--

Joint PMF of two discrete RVs $X$ and $Y$

$$\sum_x\sum_y p_{X, Y}(x, y)=1$$

--

| |&nbsp;&nbsp;&nbsp;&nbsp;$Y=0$&nbsp;&nbsp;&nbsp;&nbsp;|&nbsp;&nbsp;&nbsp;&nbsp;$Y=1$&nbsp;&nbsp;&nbsp;&nbsp;|
|:---:|:---:|:---:|
|&nbsp;&nbsp;&nbsp;&nbsp;$X=0$&nbsp;&nbsp;&nbsp;&nbsp;|$72\%$|$3\%$|
|&nbsp;&nbsp;&nbsp;&nbsp;$X=1$&nbsp;&nbsp;&nbsp;&nbsp;|$20\%$|$5\%$|

---
# Cumulative Distribution Function (CDF)

The CDF of a RV $X$ is (always) defined by

$$F_X(x)=\text{P}(X \leq x), \;\;\;\; \text{for all $x$.}$$

--

<br>

The .red[joint CDF] of two RVs $X$ and $Y$ is defined by

$$F_{X, Y}(x, y)=\text{P}(X \leq x, Y \leq y), \;\;\;\;\;\text{for all $x$ and $y$.}$$

--

Joint .red[CDFs] are often harder to work w/ than joint .green[PMFs].

For this reason, we will mainly stick with joint .green[PMFs]. 

---
# Calculate probabilities from joint PMF

<br>
$A$: the set of all pairs $(x, y)$ that have a certain property.

$$\text{P}\big((X, Y) \in A\big)=\sum_{(x, y) \in A}p_{X, Y}(x, y)$$

---
class: middle, center

.huge[Marginal PMF]

<br>

![:scale 60%](../images/marginal-pmf-cover.png)

---
We can calculate the PMF of $X$ using

$$
\small{
  p_X(x)=\text{P}(X=x)=\sum_\color{blue}{y} \text{P}(X=x, Y=y) =\sum_\color{blue}{y} p_{X, Y}(x, y)
}
$$


We refer to $p_X(x)$ as the .red[marginal PMF] of $X$.

--

.center[![:scale 60%](../images/marginal-pmf.png)]

---
Similarly, we can calculate the PMF of $Y$ using

$$
\small{
p_Y(y)=\text{P}(Y=y)=\sum_\color{red}{x} \text{P}(X=x, Y=y)=\sum_\color{red}{x} p_{X, Y}(x, y)
}
$$

We refer to $p_Y(y)$ as the .red[marginal PMF] of $Y$.
