# Conditional PMF

The .red[conditional PMF] of $X$ given $Y=y$ is defined by

$$
\begin{aligned}
\\\
p_{X \mid Y}(x \mid y)&=\text{P}(X=x \mid Y=y) \\\
\\\
&=\frac{\text{P}(X=x, Y=y)}{\text{P}(Y=y)} \\\
\\\
&=\frac{p_{X, Y}(x, y)}{p_Y(y)} \\\
\end{aligned}
$$

---
name: normalization

$$p_{X \mid Y}(x \mid y)=\frac{p_{X, Y}(x, y)}{p_Y(y)}$$

.center[![:scale 100%](../images/pmf-conditional.png)]


$p_{X \mid Y}(x \mid y)$ has the same shape as $p_{X, Y}(x, y)$
except that it is divided by $p_Y(y)$, 
which enforce the normalization property. ([Proof](#normalization_appendix))

# Slice view of conditional PMF 

$$p_{X \mid Y}(x \mid y)=\frac{p_{X, Y}(x, y)}{p_Y(y)}$$

.center[![:scale 62%](../images/pmf-conditional-x.png)]

---
# Slice view of conditional PMF 

$$p_{Y \mid X}(y \mid x)=\frac{p_{X, Y}(x, y)}{p_X(x)}$$

.center[![:scale 62%](../images/pmf-conditional-y.png)]

---

$$p_{X \mid Y}(x \mid y)=\frac{p_{X, Y}(x, y)}{p_Y(y)}$$

$$\require{color}\colorbox{yellow}{$p_{X, Y}(x, y) = p_Y(y) \cdot p_{X \mid Y}(x \mid y)$}$$

--

Similarly, 

$$p_{Y \mid X}(y \mid x)=\frac{p_{X, Y}(x, y)}{p_X(x)}$$

$$\require{color}\colorbox{yellow}{$p_{X, Y}(x, y) = p_X(x) \cdot p_{Y \mid X}(y \mid x)$}$$

--

We can use this formula to calculate the joint PMF.

---

<br>

$$
\begin{aligned}
p_{X, Y}(x, y) &= p_X(x) \cdot p_{Y \mid X}(y \mid x) \\\
\\\
&= p_Y(y) \cdot p_{X \mid Y}(x \mid y) \\\
\end{aligned}
$$

Does this look like something we have learned before?

--

<br>

This is the counterpart of the .green[multiplication rule].

$$
\begin{aligned}
\text{P}(A \cap B) &= \text{P}(A) \cdot \text{P}(B \mid A) \\\
\\\
&= \text{P}(B) \cdot \text{P}(A \mid B) \\\
\end{aligned}
$$

name: normalization_appendix
# Appendix A ([Go back](#normalization))

$$
\begin{aligned}
\\\
\sum_x p_{X \mid Y}(x \mid y)&=\sum_x \frac{p_{X,Y}(x,y)}{p_Y(y)} \\\
\\\
&=\frac{1}{p_Y(y)}  \sum_x p_{X,Y}(x,y) \\\
\\\
&=\frac{1}{p_Y(y)} \; p_Y(y) \\\
\\\
&=1 \\\
\end{aligned}
$$
