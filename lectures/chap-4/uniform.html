# [(Continuous) uniform distribution](https://en.wikipedia.org/wiki/Continuous_uniform_distribution)

The continuous counterpart of the discrete uniform RV. 

A RV $X$ that takes values in an interval $[a, b]$.

Any two sub-intervals of the same length have the same probability. 

<br>
.center[![:scale 100%](../images/unif-def.png)]

$$X \sim \text{unif}(a, b)$$

---
# Uniform distribution

Any two values in the interval $[a, b]$ have the same probability density. 

.center[![:scale 50%](../images/pdf-unif.png)]

--

Probability density function

$$f_X(x) = 
\begin{cases}
    \frac{1}{b-a}, & \text{if $a < x < b$}, \\\
    0,              & \text{otherwise.}
\end{cases}
$$

---
class: center, middle

.huge[[Interactive visualization](https://probstats.org/uniform.html)]

---

.center[![:scale 100%](../images/cdf-unif.png)]

$$
\begin{aligned}
F_X(x)&=\int_{-\infty}^x f_X(t) dt \\\
\\\
&=
\begin{cases}
    0, & \text{if $x \leq a$,} \\\
    \\\
    \frac{x-a}{b-a}, & \text{if $a < x < b$,} \\\
    \\\
    1,              & \text{if $x \geq b$.} \\\
\end{cases}
\end{aligned}
$$

---
# Standard uniform RV &nbsp;&nbsp; $U \sim \text{unif}(0, 1)$

.center[
![:scale 45%](../images/pdf-std-unif.png)
&nbsp;
![:scale 45%](../images/cdf-std-unif.png)
]

$$f_U(u) = 
\begin{cases}
    1, & \text{if $0 < u < 1$,} \\\
    0,              & \text{otherwise.}
\end{cases}
$$

$$
F_U(u)=
\begin{cases}
    0, & \text{if $u \leq 0$,} \\\
    u, & \text{if $0 < u < 1$,} \\\
    1, & \text{if $u \geq 1$.} \\\
\end{cases}
$$
