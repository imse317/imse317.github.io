# [Geometric random variable](https://en.wikipedia.org/wiki/Geometric_distribution)

Keep tossing a coin. 
At each toss 
- It lands on a heads ![:scale 3.8%](../images/coin_heads.png) with probability of $p$
- It lands on a tails ![:scale 3.8%](../images/coin_tails.png) with probability of $1-p$.

--

$X$: the number of tosses needed to get the .red[first heads]

.center[![:scale 80%](../images/geo.png)]

--

We refer to $X$ as a geometric RV with parameter $p$.

$$X \sim \text{geo}(p)$$

---
.center[![:scale 70%](../images/geo.png)]

PMF:

--

$$p_X(k)=\text{P}(X=k)=(1-p)^{k-1}p, \;\;\;\;\;\;\text{for } k=1, 2, \cdots$$

--
It can also be written as:

$$
\begin{aligned}
p_X(1)&=p \\\
\\\
p_X(k)&=\color{red}{p_X(k-1)}\cdot(1-p),\;\;\;\;\;\;\text{for } k=2, 3, \cdots \\\
\end{aligned}
$$

--

With a common ratio $(1-p)$, the PMF follows a [geometric sequence](https://en.wikipedia.org/wiki/Geometric_series), 
hence the name of the RV.

# Cumulative distribution function (CDF)

$$
\small{
\begin{aligned}
F_X(k)=\text{P}(X\leq k)&=\sum_{i=1}^k (1-p)^{i-1}p \\\
\\\
&=p\cdot\frac{1-(1-p)^k}{1-(1-p)} \\\
\\\
&=1-(1-p)^k \\\
\\\
\end{aligned}
}
$$

--

$$
\small{
\begin{aligned}
\text{An easier proof:} \;\;\;\; F_X(k)=\text{P}(X\leq k)&=1-\text{P}(X>k) \\\
\\\
&=1-\text{P}(\text{all $k$ tosses are tails})\\\
\\\
&=1-(1-p)^k \\\
\end{aligned}
}
$$


---
# Expectation & variance

<br>

$$p_X(k)=\text{P}(X=k)=(1-p)^{k-1}p, \;\;\;\;\;\text{for } k=1, 2, \cdots$$

<br>
$$
\begin{aligned}
\text{E}[X]&=\sum_{k=1}^{\infty} k (1-p)^{k-1}p = \frac{1}{p} \\\
\\\
\text{var}(X)&=\text{E}[X^2]-\big(\text{E}[X]\big)^2=\frac{1-p}{p^2} \\\
\end{aligned}
$$

# [Memoryless property](https://en.wikipedia.org/wiki/Memorylessness) of geometric RV

Given that a coin has been tossed $t$ times with all tails, 

the probability of needing more than another $s$ tosses to get a first heads, 
is the same as the prob.   of needing more than $s$ tosses to get a first heads originally.

$$\text{P}(X>t+s|X>t)=\text{P}(X>s)$$

$$\text{for all nonnegative integers $t$ and $s$}$$

It's called memoryless because .red[the past has no bearing on its future behavior]. 


---
# Proof of the memoryless property

$$
\begin{aligned}
\text{P}(X>t+s|X>t)&=\frac{\text{P}\big((X>t+s) \cap (X>t)\big)}{\text{P}(X>t)} \\\
\\\
&=\frac{\text{P}(X>t+s)}{\text{P}(X>t)} \\\
\\\
&=\frac{(1-p)^{t+s}}{(1-p)^t} \\\
\\\
&=(1-p)^s \\\
\\\
&=\text{P}(X>s) \\\
\end{aligned}
$$
