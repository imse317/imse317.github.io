---
# [Expected value](https://en.wikipedia.org/wiki/Expected_value)

The .red[expected value] of a discrete RV $X$ is defined by

$$\require{color}\colorbox{yellow}{$\text{E}[X]=\sum_x x \cdot p_X(x) $}$$

--

.center[![:scale 38%](../images/pmf-example.png)]

It's the .green[probability-weighted average] of all values of $X$.

It measures the .red[center] of the distribution.

---
What is the expected value of $X$?

.center[![:scale 30%](../images/pmf-example.png)]

$$
\small{
p_X(x) = 
\begin{cases}
    0.15, & \text{if $x = 1$,} \\\
    0.30, & \text{if $x = 2$,} \\\
    0.10, & \text{if $x = 3$,} \\\
    0.15, & \text{if $x = 4$,} \\\
    0.25, & \text{if $x = 5$,} \\\
    0.05, & \text{if $x = 6$,} \\\
    0,              & \text{otherwise.}
\end{cases}
}
$$

--

$$
\tiny{
\begin{aligned}
\text{E}[X]=&\; 1 \cdot p_X(1) + 2\cdot p_X(2) + 3 \cdot p_X(3) + 4 \cdot p_X(4) + 5 \cdot p_X(5) + 6 \cdot p_X(6) \\\
=&\; 1 \cdot 0.15 + 2 \cdot 0.30 + 3 \cdot 0.10 + 4 \cdot 0.15 + 5 \cdot 0.25 + 6 \cdot 0.05 \\\
=&\; 3.2 \\\
\end{aligned}
}
$$

# Expected value of .red[a function of a RV]

A RV $X$ has a PMF

$$
\small{
p_X(x) = 
\begin{cases}
    1/5, & \text{if $x = -2, -1, 0, 1, 2$,} \\\
    0,              & \text{otherwise.}
\end{cases}
}
$$

What is the expected value of $Y=|X|$?

--

.center[![:scale 45%](../images/function-rv-3.png)]


$$
\small{
p_Y(y) = 
\begin{cases}
    2/5, & \text{if $y = 1, 2$,} \\\
    1/5, & \text{if $y = 0$,} \\\
    0,              & \text{otherwise.}
\end{cases}
}
$$

---
Can we get $\text{E}[Y]$ directly using the PMF of $X$, rather than having to first calculating the PMF of $Y=|X|$?

--

<br>

.center[[Law Of The Unconscious Statistician (LOTUS)](https://en.wikipedia.org/wiki/Law_of_the_unconscious_statistician)]

<!-- $$\text{E}[g(X)]=\sum_x \big[g(x) \cdot p_X(x)\big] $$ -->

$$\require{color}\colorbox{yellow}{$\text{E}[g(X)]=\sum_x \big[g(x) \cdot p_X(x)\big] $}$$

--

<!-- <br>

.center[![:scale 70%](../images/function-rv-3.png)] -->

$$p_X(x) = 
\begin{cases}
    1/5, & \text{if $x = -2, -1, 0, 1, 2$,} \\\
    0,              & \text{otherwise.}
\end{cases}
$$

$$Y=|X|$$

What is the expected value of $Y$?

---
# Proof of LOTUS

$$
\begin{aligned}
\text{E}[Y]&=\sum_y \big[y \cdot p_Y(y)\big] \;\;\;\;\;\; \color{gray}{\leftarrow\text{by def. of expected value}} \\\
&=\sum_y \bigg[y \cdot \sum_{\\{x|g(x)=y\\}}p_X(x)\bigg] \\\
&=\sum_y \bigg[\sum_{\\{x|g(x)=y\\}} y \cdot p_X(x) \bigg] \\\
&=\sum_y \bigg[\sum_{\\{x|g(x)=y\\}} g(x) \cdot p_X(x) \bigg] \\\
&=\sum_x \big[g(x) \cdot p_X(x) \big] \\\
\end{aligned}
$$

---
# .red[Linearity] of the expected value

For any given constants $a$ and $b$, we have

$$\text{E}[aX+b]=a \text{E}[X] + b$$

--

Proof

$$
\begin{aligned}
\text{E}[aX+b]&=\sum_x \big[(ax+b) \cdot p_X(x)\big] \;\;\;\;\;  \color{gray}{\leftarrow\text{by LOTUS}} \\\
&=\sum_x \big[ ax \cdot p_X(x) + b \cdot p_X(x)\big] \\\
&=a\sum_x \big[x \cdot p_X(x) \big] + b \sum_x p_X(x) \\\
&=a\text{E}[X]+b \\\
\end{aligned}
$$


---
<!-- # One caution -->

$$\text{E}[aX+b]=a \text{E}[X] + b$$

That is, when $g(X)$ is a linear function, we have

$$\text{E}\big[g(X)\big]=g\big(\text{E}[X]\big)$$


--

$$\text{Celcius}=(\text{Farenheit}-32) \cdot \frac{5}{9}$$

--

If we already know $\text{E[Farenheit]}=41$, then 

$$\text{E[Celcius]}=(\text{E[Farenheit]}-32) \cdot \frac{5}{9}=(41-32) \cdot \frac{5}{9}=5$$

--

However, in general, 

$$\text{E}\big[g(X)\big] \neq g\big(\text{E}[X]\big)$$


---
# Example

Sarah lives 2 miles away from the campus.

She walks to classes at 4 mph if the weather is good (assuming that is half of the time).

Otherwise, she cycles to classes at a speed of 20 mph. 

What is the expected 

- travel speed? 

- travel time?

---

# Travel speed $V$

$$
\begin{aligned}
p_V(v) &=
\begin{cases}
    0.5, & \text{if $v=4$ or 20 mph,} \\\
    0,   & \text{otherwise.} \\\
\end{cases}
\end{aligned}
$$

--
$$\text{E}[V] = 4 \cdot 0.5 + 20 \cdot 0.5 = 12 \text{ (mph)}$$

---
# Travel time $T$

$$T=g(V)=\frac{\text{distance}}{V}=\frac{2}{V}$$

--

$$
\small{
\begin{aligned}
t &= 
\begin{cases}
2 \textcolor{lightgray}{\text{ miles}}/4 \textcolor{lightgray}{\text{ mph}}=0.5 \textcolor{lightgray}{\text{ hours}}, & \text{if walking,} \\\
2 \textcolor{lightgray}{\text{ miles}}/20 \textcolor{lightgray}{\text{ mph}}=0.1 \textcolor{lightgray}{\text{ hours}},   & \text{if cycling.} \\\
\end{cases}
\end{aligned}
}
$$

--

$$
\small{
\begin{aligned}
p_T(t) &= 
\begin{cases}
    0.5, & \text{if $t=0.1$ or 0.5 hours,} \\\
    0,   & \text{otherwise.} \\\
\end{cases}
\end{aligned}
}
$$

--

$$\small{\color{gray}{\big(\text{E}\big[g(V)\big]=\big)} \;\; \text{E}[T] = 0.1 \cdot 0.5 + 0.5 \cdot 0.5 = 0.3 \text{ (hours)}}$$

--

$$\small{g\big(\text{E}[V]\big)=\frac{2}{\text{E}[V]}=\frac{2}{12}\approx0.167}$$

--

$$\small{\text{E}\big[g(V)\big] \neq g\big(\text{E}[V]\big)}$$
