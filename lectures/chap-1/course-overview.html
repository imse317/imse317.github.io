# Engineering Probability & Statistics

.center[.large[What is .red[probability]?]]

--

As a .green[number], probability encodes our knowledge or belief about how likely some event will occur. 

--
- Toss a coin 5 times and get 5 heads in a row?

--
- How likely a medical treatment will be successful for a patient?

--
- How likely the stock market will go up next week?

--

As a .green[discipline], probability theory is a branch of mathematics concerned with probability (as a number).
