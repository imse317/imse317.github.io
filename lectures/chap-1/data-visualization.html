# Dot plot

- Each data point is represented by a dot above its corresponding location on a horizontal scale.
- Dots with the same values are stacked vertically. 

 
$$\large{[9, 10, 15, 22, 9, 15, 16, 24, 11]}$$

<br><br><br>
.center[![:scale 80%](../images/dotplot-scale.png)]

# Histogram

.center[
![:scale 48%](../images/hist-volcano-frequency.png)&nbsp;&nbsp;&nbsp;
![:scale 48%](../images/hist-volcano-percent.png)
]

--
- Frequency: The number of data points in a bin

--

- Divide frequency by the total number of data points

$$\text{percent (or relative frequency)}=\frac{\text{frequency}}{\text{total # of data points}}$$

---

.center[
![:scale 38%](../images/stemleaf-rotated.png)&nbsp;&nbsp;&nbsp;
![:scale 38%](../images/hist-volcano-frequency.png)
]

--

Stem-and-leaf plot
- contains more info as it includes the values of data.
- only suitable with small data size, as large amount of data require room for the leaves.
- requires the viewer to "decode" the chart. 

Histogram is more commonly used in practice.

import numpy
import pandas

```

```
bank = pandas.read_csv("https://imse317.github.io/data/bank.csv")
bank.head()
```

```
seaborn.histplot(data=bank["age"], 
                 bins=np.arange(0, 90, 5), 
                 stat="probability")
