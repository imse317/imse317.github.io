# [Population](https://en.wikipedia.org/wiki/Statistical_population)

- A collection of objects of interest in a study

--

<br>

- Study: Which candidate would win the election?

--

  - Population: Everyone who are planning to vote

--

<br>

- Study: What is the defect rate of a cellphone screen from a certain manufacturer? 

--

  - Population: All the cellphone screens made by that manufacturer

---

# [Sample](https://en.wikipedia.org/wiki/Sample_%28statistics%29)

- .red[A subset of the population] selected by a defined procedure

--

- Study: Which candidate would win the election?
  - Population: Everyone who are planning to vote
  - Sample: 
--
.red[An telephone poll of 500 potential voters]

--

- Study: What is the defect rate of a cellphone screen from a manufacturer? 

  - Population: All screens from the manufacturer
  - Sample: 
--
.red[Selecting 200 screens for inspection]

---
# Variable

A characteristic of interest for the elements. 

--

- Houses 🏠
  - size, # of bedrooms, year built, school district, ...

--

- Patients
  - age, BMI, blood sugar level, ...

--

- Universities
  - tuition, enrollment, graduation rate, ...

---
# .red[Discrete] variables

The variable takes finite or countably infinite values.

--

- Toss a coin 4 times, the number of heads you get

<br><br>

--

- The attendance to a basketball game

<br><br>

--

- The number of orders that a shop receives in a day

---
# .red[Continuous] variables

The variable takes infinitely many, uncountable values.


--

- The speed of riding a bicycle 🚲

--

- The water level of dam

--

- The time when an order arrives at a shop

--

<br>

If it can take on two particular real values, it can also take on all real values between them.
