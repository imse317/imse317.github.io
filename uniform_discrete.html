<!DOCTYPE html>
<html>
<meta charset="utf-8">
 
<head>
    <title>Discrete uniform distribution</title>
    <link type="text/css" rel="stylesheet" media="screen" href="./css/page.css">
    <link type="text/css" rel="stylesheet" media="screen" href="./css/chart.css">
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-AMS_HTML&delayStartupUntil=configured" type="text/javascript"></script>
    <script src="./js/mathjax_config.js"></script>
</head>
 
<body>

<div class="container">

<h1>Discrete uniform distribution</h1>

<p class="description">
    Roll a fair $n$-sided die, what is the chance it lands on any given number?
</p>

<div id="chart"></div>

<div class="controls">
    <div class="slider-label">
        <p>$a=$ <span id="slider_value_0"></span></p>
    </div>

    <div class="slider-container">
        <input type="range" id="slider_0" class="slider" min="1" max="10" step="1"><br>
    </div>

    <br>
    <div class="slider-label">
        <p>$b=$ <span id="slider_value_1"></span></p>
    </div>

    <div class="slider-container">
        <input type="range" id="slider_1" class="slider" min="1" max="10" step="1"><br>
    </div>
</div>

<div class="formula">
$$
    p(k) = 
    \begin{cases}
        1/n, & \text{if $k = a, a+1, \cdots, b-1, b$,} \\
        0,   & \text{otherwise.}
    \end{cases} 
        \\[16pt]
        \text{where $n=b-a+1$.}
$$
</div>

<script src="./js/rand.js"></script>
<script src="./js/chart_functions.js"></script>
<script src="./js/dist/uniform_discrete.js"></script>

</div>

</body>
</html>
