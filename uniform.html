<!DOCTYPE html>
<html>
<meta charset="utf-8">
 
<head>
    <title>Uniform distribution</title>
    <link type="text/css" rel="stylesheet" media="screen" href="./css/page.css">
    <link type="text/css" rel="stylesheet" media="screen" href="./css/chart.css">
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-AMS_HTML&delayStartupUntil=configured" type="text/javascript"></script>
    <script src="./js/mathjax_config.js"></script>
    
</head>
 
<body>

<div class="container">

<h1>Uniform distribution</h1>

<div id="chart"></div>

<br>
<div class="slider-label">
    <p>$a=$ <span id="a-value"></span></p>
</div>

<div class="slider-container">
    <input type="range" id="a-slider" class="slider" min="0" max="10" step="0.01"><br>
</div>

<br>

<div class="slider-label">
    <p>$b=$ <span id="b-value"></span></p>
</div>

<div class="slider-container">
    <input type="range" id="b-slider" class="slider" min="0" max="10" step="0.01"><br>
</div>

<div class="formula">
$$
    f(x) = 
    \begin{cases}
        \frac{1}{b-a}, & \text{if $a \leq x \leq b$,} \\
        0,              & \text{otherwise.}
    \end{cases}
    \\[16pt]
    \text{where $a$ and $b$ are the lower and upper bound of the interval.}
$$
</div>


<script src="./js/dist/uniform.js"></script>

</div>

</body>
</html>
