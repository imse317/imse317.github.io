<!DOCTYPE html>
<html>
<meta charset="utf-8">
 
<head>
    <title>Normal distribution</title>
    <link type="text/css" rel="stylesheet" media="screen" href="./css/page.css">
    <link type="text/css" rel="stylesheet" media="screen" href="./css/chart.css">

    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-AMS_HTML&delayStartupUntil=configured" type="text/javascript"></script>
    <script src="./mathjax_config.js"></script>
</head>
 
<body>

<div class="container">

<h1>Normal distribution</h1>

<h2>$$\small{
    f(x)=\frac{1}{\sigma\sqrt{2\pi}}e^{-\frac{1}{2}(\frac{x-\mu}{\sigma})^2}
    }$$
</h2>

<div id="chart"></div>

<div class="slider-label">
    <p>$\mu=$ <span id="mu-value"></span></p>
</div>

<div class="slider-container">
    <input type="range" id="mu-slider" class="slider" min="0" max="50" step="0.1"><br>
</div>

<br>
<div class="slider-label">
    <p>$\sigma=$ <span id="sigma-value"></span></p>
</div>

<div class="slider-container">
    <input type="range" id="sigma-slider" class="slider" min="3" max="20" step="0.1"><br>
</div>

<script src="normal.js"></script>

</div>

</body>
</html>
