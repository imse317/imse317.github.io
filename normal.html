<!DOCTYPE html>
<html>
<meta charset="utf-8">
 
<head>
    <title>Normal distribution</title>
    <link type="text/css" rel="stylesheet" media="screen" href="./css/page.css">
    <link type="text/css" rel="stylesheet" media="screen" href="./css/chart.css">
    <script src="https://d3js.org/d3.v6.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jstat@latest/dist/jstat.min.js"></script> 
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.5/MathJax.js?config=TeX-AMS_HTML&delayStartupUntil=configured"></script>
    <script src="./js/mathjax_config.js"></script>
</head>
 
<body>

<div class="container">

<h1>Normal distribution</h1>

<div id="chart"></div>

<div class="slider-label">
    <p>$\mu=$ <span id="mu-value"></span></p>
</div>

<div class="slider-container">
    <input type="range" id="mu-slider" class="slider" min="0" max="50" step="0.1"><br>
</div>

<div class="slider-label">
    <p>$\sigma=$ <span id="sigma-value"></span></p>
</div>

<div class="slider-container">
    <input type="range" id="sigma-slider" class="slider" min="3" max="20" step="0.1"><br>
</div>

<div class="formula">
$$
f(x)=\frac{1}{\sigma\sqrt{2\pi}}e^{-\frac{1}{2}(\frac{x-\mu}{\sigma})^2}
\\[16pt]
\text{where $\mu$ is the mean and $\sigma$ is the standard deviation.}
$$
</div>

</div>

</body>

<script src="./js/dist/normal.js"></script>

</html>
